<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моя Mini App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <!-- Контент будет меняться при навигации -->
    <div class="page-content" id="page-content">
      <div class="page active" id="home-page">
        <h1>Главная</h1>
        <p>Добро пожаловать в наше приложение!</p>
      </div>
      
      <div class="page" id="catalog-page">
        <h1>Каталог</h1>
        <div class="product-grid"></div>
      </div>
      
      <div class="page" id="cart-page">
        <h1>Корзина</h1>
        <div class="cart-items"></div>
      </div>
      
      <div class="page" id="profile-page">
        <h1>Профиль</h1>
        <div class="user-info"></div>
      </div>
    </div>
    
    <!-- Нижняя панель навигации -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="home-page">
        <i class="fas fa-home"></i>
        <span>Главная</span>
      </button>
      <button class="nav-btn" data-page="catalog-page">
        <i class="fas fa-search"></i>
        <span>Каталог</span>
      </button>
      <button class="nav-btn" data-page="cart-page">
        <i class="fas fa-shopping-cart"></i>
        <span>Корзина</span>
      </button>
      <button class="nav-btn" data-page="profile-page">
        <i class="fas fa-user"></i>
        <span>Профиль</span>
      </button>
    </nav>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
